<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cancel Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Bus Terminal - Employee Portal</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card shadow border-0 border-danger">
                    <div class="card-header bg-danger text-white text-center">
                        <h4 class="mb-0">Cancel Reservation</h4>
                    </div>

                    <div class="card-body p-4 text-center">
                        <h5 class="text-danger mb-3">Are you absolutely sure?</h5>
                        <p>You are about to cancel the ticket for <strong>{{ ticket.passenger_name }}</strong> traveling from <strong>{{ ticket.origin }}</strong> to <strong>{{ ticket.destination }}</strong>.</p>
                        <p class="text-muted small">This action cannot be undone.</p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger">Yes, Cancel Ticket</button>
                                <a href="{% url 'view_bookings' %}" class="btn btn-secondary">No, Keep Ticket</a>
                            </div>
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
