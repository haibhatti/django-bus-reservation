<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Step 2: Confirm Ticket</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Bus Terminal - Employee Portal</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0 text-center">Step 2: Confirm Fare & Details</h4>
                    </div>

                    <div class="card-body p-4">
                        
                        <!-- Read-only Summary Table -->
                        <table class="table table-bordered mb-4">
                            <tbody>
                                <tr>
                                    <th class="bg-light w-50">Passenger Name:</th>
                                    <td>{{ passenger }}</td>
                                </tr>
                                <tr>
                                    <th class="bg-light">Trip:</th>
                                    <td>{{ trip }}</td>
                                </tr>
                                <tr>
                                    <th class="bg-light">Route:</th>
                                    <td>{{ origin }} ➔ {{ destination }}</td>
                                </tr>
                                <tr>
                                    <th class="bg-light">Seat Number:</th>
                                    <td>{{ seat }}</td>
                                </tr>
                                <tr class="table-warning">
                                    <th>Total Fare to Collect:</th>
                                    <td class="fw-bold fs-5 text-success">Rs. {{ price }}</td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <p class="text-muted text-center small mb-4"></p>

                        <!-- Final Database Submission Form -->
                        <form method="POST">
                            {% csrf_token %}
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg">Confirm Booking</button>
                                <a href="{% url 'book_ticket' %}" class="btn btn-outline-secondary">Edit Details</a>
                            </div>
                        </form>

                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
