<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Bus Terminal - Employee Portal</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow border-0">
                    <div class="card-header bg-warning text-dark text-center">
                        <h4 class="mb-1">Edit Passenger Details</h4>
                        <span class="badge bg-dark fs-6">{{ ticket.origin }} ➔ {{ ticket.destination }}</span>
                    </div>

                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            {{ form.as_p }}
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-warning fw-bold">Update Details</button>
                                <a href="{% url 'view_bookings' %}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
